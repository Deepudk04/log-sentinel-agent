name: LogSentinel
description: Scan Python and Java repositories for logging and exception-handling issues.
author: LogSentinel Contributors

inputs:
  path:
    description: Repository path to scan.
    required: false
    default: "."
  config:
    description: Optional path to logsentinel.yml.
    required: false
    default: ""
  semantic_enabled:
    description: Enable Gemini semantic analysis.
    required: false
    default: "false"
  gemini_api_key:
    description: Gemini API key for semantic analysis.
    required: false
    default: ""
  fail_on:
    description: Fail when findings are at or above this severity.
    required: false
    default: "high"
  output_format:
    description: Comma-separated report formats.
    required: false
    default: "sarif"
  upload_sarif:
    description: Upload SARIF with github/codeql-action/upload-sarif.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install LogSentinel
      shell: bash
      run: python -m pip install --upgrade pip && python -m pip install "$GITHUB_ACTION_PATH"

    - name: Run LogSentinel
      shell: bash
      env:
        GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
        LOGSENTINEL_INPUT_PATH: ${{ inputs.path }}
        LOGSENTINEL_INPUT_CONFIG: ${{ inputs.config }}
        LOGSENTINEL_INPUT_SEMANTIC_ENABLED: ${{ inputs.semantic_enabled }}
        LOGSENTINEL_INPUT_FAIL_ON: ${{ inputs.fail_on }}
        LOGSENTINEL_INPUT_OUTPUT_FORMAT: ${{ inputs.output_format }}
      run: |
        args=("$LOGSENTINEL_INPUT_PATH" "--format" "$LOGSENTINEL_INPUT_OUTPUT_FORMAT" "--fail-on" "$LOGSENTINEL_INPUT_FAIL_ON")
        if [ "$LOGSENTINEL_INPUT_SEMANTIC_ENABLED" != "true" ]; then
          args+=("--no-semantic")
        fi
        if [ -n "$LOGSENTINEL_INPUT_CONFIG" ]; then
          args+=("--config" "$LOGSENTINEL_INPUT_CONFIG")
        fi
        logsentinel-scan "${args[@]}"

    - name: Locate SARIF
      id: locate-sarif
      shell: bash
      run: |
        latest_sarif="$(find reports -maxdepth 1 -type f -name '*.sarif' -printf '%T@ %p\n' | sort -nr | head -n1 | cut -d' ' -f2-)"
        echo "sarif_file=$latest_sarif" >> "$GITHUB_OUTPUT"

    - name: Upload SARIF
      if: ${{ inputs.upload_sarif == 'true' && steps.locate-sarif.outputs.sarif_file != '' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ steps.locate-sarif.outputs.sarif_file }}
