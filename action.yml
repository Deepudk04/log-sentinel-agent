name: LogSentinel
description: Scan Python and Java repositories for logging and exception-handling issues.
author: LogSentinel Contributors

inputs:
  path:
    description: Repository path to scan.
    required: false
    default: "."
  config:
    description: Optional path to logsentinel.yml.
    required: false
    default: ""
  semantic_enabled:
    description: Enable Gemini semantic analysis.
    required: false
    default: "false"
  gemini_api_key:
    description: Gemini API key for semantic analysis.
    required: false
    default: ""
  fail_on:
    description: Fail when findings are at or above this severity.
    required: false
    default: "high"
  output_format:
    description: Comma-separated report formats.
    required: false
    default: "sarif"
  upload_sarif:
    description: Upload SARIF with github/codeql-action/upload-sarif.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install LogSentinel
      shell: bash
      run: python -m pip install --upgrade pip && python -m pip install "$GITHUB_ACTION_PATH"

    - name: Run LogSentinel
      shell: bash
      env:
        GEMINI_API_KEY: ${{ inputs.gemini_api_key }}
      run: |
        args=("${{ inputs.path }}" "--format" "${{ inputs.output_format }}" "--fail-on" "${{ inputs.fail_on }}")
        if [ "${{ inputs.semantic_enabled }}" != "true" ]; then
          args+=("--no-semantic")
        fi
        if [ -n "${{ inputs.config }}" ]; then
          args+=("--config" "${{ inputs.config }}")
        fi
        logsentinel-scan "${args[@]}"

    - name: Upload SARIF
      if: ${{ inputs.upload_sarif == 'true' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: reports
