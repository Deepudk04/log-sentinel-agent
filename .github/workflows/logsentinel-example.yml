name: LogSentinel

on:
  pull_request:
  push:

jobs:
  logsentinel:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          path: "."
          semantic_enabled: "false"
          fail_on: "critical"
          output_format: "sarif"
          upload_sarif: "true"
